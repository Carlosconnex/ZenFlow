<!doctype html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/top_level.css') }}" />
    <title>{{ name }} - Dashboard</title>
</head>
<body>
    <header class="navbar">
        <div class="logo"><b>{{ name }}</b> Dashboard</div>
    </header>

    <main class="container">
        <section class="board-grid">
            <h2>Your Boards</h2>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                {% for board in boards %}
                <a href="{{ url_for('main.view_board', board_id=board.id) }}" class="board-card">
                    <div style="padding: 20px; background: #0079bf; color: white; border-radius: 8px; width: 150px;">
                        {{ board.title }}
                    </div>
                </a>
                {% endfor %}
                
                <form action="/add_board" method="POST" class="add-board">
                    <input type="text" name="title" placeholder="New Board Title..." required />
                    <button type="submit">Create Board</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
